name: Release

on:
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish the built distribution to PyPI"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Compile Python modules
        run: python3 -m py_compile src/claude_glm52_supervisor/*.py outputs/*.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Run public audit
        run: python3 scripts/public_audit.py

  build-python-distribution:
    name: Build wheel and sdist
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build backend frontend
        run: python3 -m pip install --upgrade build

      - name: Build distribution
        run: python3 -m build

      - name: Store Python distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  github-release-assets:
    name: Create draft GitHub release assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build release assets
        run: packaging/release/build-release-assets.sh --version "${GITHUB_REF_NAME}" --out-dir release-assets

      - name: Create draft GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" release-assets/*
          --draft
          --verify-tag
          --title "${GITHUB_REF_NAME}"
          --notes "Draft release assets for ${GITHUB_REF_NAME}."

  publish-to-pypi:
    name: Publish Python distribution to PyPI
    if: github.event_name == 'workflow_dispatch' && inputs.publish_pypi == true
    needs: build-python-distribution
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/claude-glm52-supervisor
    permissions:
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
